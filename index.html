<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAHAMPRO - Dashboard Terpadu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0f172a; color: white; font-family: sans-serif; }</style>
</head>
<body class="p-4">
    <h1 class="text-2xl font-bold mb-4 text-emerald-400">SAHAMPRO Dashboard</h1>
    
    <div class="tradingview-widget-container" style="height: 800px; width: 100%;">
        <div id="tradingview_full_chart" style="height: 100%; width: 100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            new TradingView.widget({
                "container_id": "tradingview_full_chart",
                "symbol": "IDX:CUAN",
                "theme": "dark",
                "autosize": true,
                "interval": "D",
                "timezone": "Asia/Jakarta",
                "allow_symbol_change": true,
                "details": true,     // Memunculkan data fundamental di sisi kanan
                "hotlist": true,     // Memunculkan market flow/bandarmologi sederhana
                "calendar": true,
                "support_host": "https://www.tradingview.com"
            });
        </script>
    </div>
</body>
</html>
