<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IDX Smart Analyzer</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#38bdf8;
    }

    .search-box{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }

    input{
      width:300px;
      padding:12px;
      border:none;
      border-radius:10px;
      outline:none;
      font-size:16px;
    }

    button{
      padding:12px 20px;
      margin-left:10px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
    }

    .card h2{
      margin-bottom:15px;
      color:#38bdf8;
    }

    .data-row{
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
    }

    canvas{
      background:white;
      border-radius:10px;
      padding:10px;
    }

    .buy{
      color:#22c55e;
      font-weight:bold;
    }

    .sell{
      color:#ef4444;
      font-weight:bold;
    }

    .neutral{
      color:#facc15;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <h1>IDX SMART ANALYZER</h1>

  <div class="search-box">
    <input type="text" id="stockInput" placeholder="Contoh: BBCA">
    <button onclick="loadStock()">Analisa</button>
  </div>

  <div class="container">

    <div class="card">
      <h2>Fundamental</h2>

      <div class="data-row">
        <span>PER</span>
        <span id="per">-</span>
      </div>

      <div class="data-row">
        <span>PBV</span>
        <span id="pbv">-</span>
      </div>

      <div class="data-row">
        <span>ROE</span>
        <span id="roe">-</span>
      </div>

      <div class="data-row">
        <span>Market Cap</span>
        <span id="marketcap">-</span>
      </div>

    </div>

    <div class="card">
      <h2>Technical</h2>

      <div class="data-row">
        <span>RSI</span>
        <span id="rsi">-</span>
      </div>

      <div class="data-row">
        <span>MACD</span>
        <span id="macd">-</span>
      </div>

      <div class="data-row">
        <span>Trend</span>
        <span id="trend">-</span>
      </div>

      <canvas id="priceChart"></canvas>
    </div>

    <div class="card">
      <h2>Bandarmology</h2>

      <div class="data-row">
        <span>Foreign Flow</span>
        <span id="foreign">-</span>
      </div>

      <div class="data-row">
        <span>Broker Top Buy</span>
        <span id="topbuy">-</span>
      </div>

      <div class="data-row">
        <span>Broker Top Sell</span>
        <span id="topsell">-</span>
      </div>

      <div class="data-row">
        <span>Signal</span>
        <span id="signal" class="neutral">NEUTRAL</span>
      </div>

    </div>

  </div>

<script>

let chart;

async function loadStock(){

  const stock = document.getElementById("stockInput").value.toUpperCase();

  if(!stock){
    alert("Masukkan kode saham");
    return;
  }

  // Dummy data sementara
  // Nanti bisa diganti API real

  const fundamental = {
    per: (Math.random()*20).toFixed(2),
    pbv: (Math.random()*5).toFixed(2),
    roe: (Math.random()*30).toFixed(2)+"%",
    marketcap: "Rp " + (Math.random()*500).toFixed(0) + " T"
  };

  const technical = {
    rsi: (Math.random()*100).toFixed(2),
    macd: (Math.random()*10).toFixed(2),
    trend: Math.random() > 0.5 ? "Bullish" : "Bearish"
  };

  const bandar = {
    foreign: Math.random() > 0.5 ? "Net Buy" : "Net Sell",
    topbuy: "XL",
    topsell: "PD"
  };

  // Fundamental
  document.getElementById("per").innerText = fundamental.per;
  document.getElementById("pbv").innerText = fundamental.pbv;
  document.getElementById("roe").innerText = fundamental.roe;
  document.getElementById("marketcap").innerText = fundamental.marketcap;

  // Technical
  document.getElementById("rsi").innerText = technical.rsi;
  document.getElementById("macd").innerText = technical.macd;
  document.getElementById("trend").innerText = technical.trend;

  // Bandar
  document.getElementById("foreign").innerText = bandar.foreign;
  document.getElementById("topbuy").innerText = bandar.topbuy;
  document.getElementById("topsell").innerText = bandar.topsell;

  // Signal
  const signal = document.getElementById("signal");

  if(technical.trend === "Bullish"){
    signal.innerText = "AKUMULASI";
    signal.className = "buy";
  }else{
    signal.innerText = "DISTRIBUSI";
    signal.className = "sell";
  }

  // Chart
  const labels = ["Sen","Sel","Rab","Kam","Jum"];
  const prices = Array.from({length:5},()=>Math.floor(Math.random()*1000));

  if(chart){
    chart.destroy();
  }

  const ctx = document.getElementById('priceChart');

  chart = new Chart(ctx, {
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:stock,
        data:prices,
        tension:0.4
      }]
    }
  });

}

</script>

</body>
</html>
