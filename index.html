<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAHAMPRO - Dashboard Analisa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">

    <h1 class="text-3xl font-black mb-6 text-emerald-400">SAHAMPRO Dashboard</h1>

    <div class="h-[500px] w-full mb-8">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_widget" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "container_id": "tradingview_widget",
                    "symbol": "IDX:BBRI", // Ganti kode saham di sini
                    "theme": "dark",
                    "autosize": true,
                    "interval": "D",
                    "timezone": "Asia/Jakarta"
                });
            </script>
        </div>
    </div>

    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
        <h2 class="text-xl font-bold mb-4">Ringkasan Analisa (Simulasi)</h2>
        <table class="w-full text-left">
            <tr class="border-b border-slate-700">
                <th class="py-2">Indikator</th>
                <th class="py-2">Nilai</th>
            </tr>
            <tr>
                <td class="py-2 text-gray-400">Rekomendasi Bandar</td>
                <td class="py-2 text-emerald-400 font-bold">Strong Accumulation</td>
            </tr>
            <tr>
                <td class="py-2 text-gray-400">Fundamental Score</td>
                <td class="py-2">8.5/10</td>
            </tr>
        </table>
    </div>

</body>
</html>
