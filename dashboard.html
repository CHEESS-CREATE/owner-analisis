<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAMPRO - Dashboard Analisa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <nav class="mb-8 flex justify-between items-center">
            <span class="text-2xl font-black text-white">SAHAM<span class="text-emerald-400">PRO</span></span>
            <span class="text-emerald-400 text-sm font-bold border border-emerald-500 px-3 py-1 rounded-lg">Analisa Real-Time</span>
        </nav>
        
        <header class="mb-10">
            <h1 class="text-3xl md:text-5xl font-black text-white">Pusat Analisa Saham</h1>
            <p class="text-gray-400 mt-2">Cari kode saham (Contoh: BBCA, TLKM, GOTO) untuk melihat analisa lengkap.</p>
        </header>

        <div class="h-[600px] w-full bg-[#1e293b] rounded-3xl overflow-hidden border border-gray-800 shadow-2xl">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_chart" style="height:100%;width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                    new TradingView.widget({
                        "container_id": "tradingview_chart",
                        "symbol": "IDX:BBRI",
                        "theme": "dark",
                        "autosize": true,
                        "interval": "D",
                        "timezone": "Asia/Jakarta",
                        "allow_symbol_change": true,
                        "details": true,
                        "calendar": true,
                        "hotlist": true
                    });
                </script>
            </div>
        </div>

        <footer class="mt-12 text-center text-gray-500 text-sm">
            &copy; 2026 SAHAMPRO - Analisa Teknikal & Fundamental Terintegrasi
        </footer>
    </div>

</body>
</html>
