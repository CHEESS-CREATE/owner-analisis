<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAHAMPRO - Analisa Lengkap</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 md:p-8">

    <h1 class="text-3xl font-black mb-6 text-emerald-400">SAHAMPRO Dashboard</h1>
    <p class="text-gray-400 mb-6">Ketik kode saham (misal: BBCA, TLKM, GOTO, ASII) di kolom pencarian pada grafik di bawah:</p>

    <div class="h-[600px] w-full bg-slate-800 rounded-2xl overflow-hidden border border-slate-700">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_chart" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "container_id": "tradingview_chart",
                    "symbol": "IDX:CUAN",
                    "theme": "dark",
                    "autosize": true,
                    "interval": "D",
                    "timezone": "Asia/Jakarta",
                    "allow_symbol_change": true, // <--- INI KUNCI AGAR BISA GANTI SAHAM
                    "details": true,
                    "calendar": true,
                    "hotlist": true
                });
            </script>
        </div>
    </div>

</body>
</html>
